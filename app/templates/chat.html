<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopBot IA — Démo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-emerald-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col" style="height: 85vh">
    <div class="bg-emerald-600 text-white p-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-xl">🤖</div>
      <div>
        <div class="font-bold">ShopBot IA</div>
        <div class="text-xs text-emerald-100">Assistant de vente — propulsé par Claude</div>
      </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3">
      <div class="bg-emerald-100 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[85%] text-sm">
        Salama ! 👋 Bienvenue dans notre boutique. Demandez-moi ce qui est disponible, les prix, ou passez commande !
      </div>
    </div>

    <form id="form" class="p-3 border-t flex gap-2">
      <input id="input" autocomplete="off" placeholder="Écrivez votre message..."
        class="flex-1 border rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <button class="bg-emerald-600 text-white rounded-full px-5 py-2 text-sm font-medium hover:bg-emerald-700">➤</button>
    </form>
  </div>

  <script>
    const sessionId = "web-" + Math.random().toString(36).slice(2);
    const messagesEl = document.getElementById("messages");

    function addBubble(text, mine) {
      const div = document.createElement("div");
      div.className = mine
        ? "bg-emerald-600 text-white rounded-2xl rounded-tr-sm px-4 py-2 max-w-[85%] text-sm ml-auto"
        : "bg-emerald-100 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[85%] text-sm";
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addBubble(text, true);
      const botBubble = addBubble("…", false);

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      if (!res.ok) { botBubble.textContent = "⚠️ " + (await res.text()); return; }

      botBubble.textContent = "";
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        botBubble.textContent += decoder.decode(value, { stream: true });
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    });
  </script>
</body>
</html>
